      property="og:title"
      content="Auction Platform - MERN Project by Romilda. J"

      property="og:description"

      <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Auction Platform",
        "url": "https://auctionplatfrom-frontend.netlify.app/",
        "description": "Real-time online bidding platform built with the MERN stack. Create auctions, place bids, and win items.",
        "author": {
          "@type": "Person",
          "name": "Romilda. J",
          "url": "https://github.com/Romildajayaraj/AuctionPlatform-Frontend"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://auctionplatfrom-frontend.netlify.app/auction?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
